title: LIN Workbench
views:
  - title: Status
    path: status
    icon: mdi:transit-connection-variant
    cards:
      - type: markdown
        title: Current Architecture
        content: |
          ## Event-only LIN bridge

          ESPHome Precision Plex LIN v0.6.x sends a versioned event snapshot to
          Home Assistant. The **Precision Plex integration owns decoded
          telemetry entities, freshness, and LIN/Bluetooth source selection**.

          The firmware intentionally no longer publishes individual decoded
          sensors, raw-frame text sensors, or analyzer counters as ESPHome
          entities. Detailed protocol investigation remains available in the
          ESPHome device logs.

          - Preferred telemetry: **LIN**
          - Shared-field fallback: **Bluetooth**
          - Commands: **Bluetooth**

      - type: entities
        title: Integration Transport
        show_header_toggle: false
        entities:
          - entity: sensor.basement_precision_plex_telemetry_transport
            name: Telemetry Transport
          - entity: binary_sensor.basement_precision_plex_ble_connected
            name: Bluetooth Connected

      - type: markdown
        title: LIN Snapshot Diagnostics
        content: |
          {% set transport = 'sensor.basement_precision_plex_telemetry_transport' %}

          | Field | Value |
          |---|---|
          | Selected transport | `{{ states(transport) }}` |
          | Firmware | `{{ state_attr(transport, 'lin_firmware_version') }}` |
          | Event snapshot active | `{{ state_attr(transport, 'lin_event_snapshot_active') }}` |
          | LIN bus active | `{{ state_attr(transport, 'lin_bus_active') }}` |
          | Core telemetry active | `{{ state_attr(transport, 'lin_core_telemetry_active') }}` |
          | Output state active | `{{ state_attr(transport, 'lin_output_state_active') }}` |
          | Packets/second | `{{ state_attr(transport, 'lin_packets_per_second') }}` |
          | Known packets | `{{ state_attr(transport, 'lin_known_packets') }}` |
          | Unknown packets | `{{ state_attr(transport, 'lin_unknown_packets') }}` |
          | CRC/errors | `{{ state_attr(transport, 'lin_crc_errors') }}` |
          | Last PID | `{{ state_attr(transport, 'lin_last_pid') }}` |
          | Snapshot sequence | `{{ state_attr(transport, 'lin_snapshot_sequence') }}` |
          | Snapshot reason | `{{ state_attr(transport, 'lin_snapshot_reason') }}` |

