          - entity: sensor.basement_precision_plex_hvac_zone_2_compressor_lockout
            name: Lockout Countdown

      - type: markdown
        title: PID37 Decode Reference
        content: |
          | Field | Current interpretation |
          |---|---|
          | B4 | Selected HVAC mode; zone-aware |
          | B5 | Request, phase, or controller context |
          | B6 | Current operating state and fan level |
          | B7 | Room temperature in °F |
          | B8 | Setpoint in °F |
          | B9 | Compressor anti-short-cycle restart delay |
          | B10 | Static/reserved candidate; `0x06` observed |

          Furnace blower operation is not confirmed in PID37. Furnace phase is
          currently inferred from B5.

