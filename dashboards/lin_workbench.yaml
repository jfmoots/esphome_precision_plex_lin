      - type: markdown
        title: PID32 Confirmed Mapping
        content: |
          | Data byte | Bit | Decode |
          |---:|---:|---|
          | 0 | `0x01` | Awning light |
          | 0 | `0x10` | Water heater |
          | 0 | `0x40` | Tank heater |
          | 0 | `0x80` | Water pump |
          | 1 | `0x01` | Sofa extend |
          | 1 | `0x02` | Awning retract |
          | 1 | `0x04` | Awning extend |
          | 1 | `0x08` | Bedroom slide extend |
          | 1 | `0x10` | Bedroom slide retract |
          | 1 | `0x80` | Sofa retract |
          | 2 | `0x02` | Wardrobe retract |
          | 2 | `0x04` | Wardrobe extend |
          | 5 | `0x40` | Generator running |

  - title: Research
    path: research
    icon: mdi:flask-outline
    cards:
      - type: markdown
        title: Firmware Investigation Controls
        content: |
          The v0.6.x firmware exposes only the controls below. Analyzer results,
          raw frames, flight-recorder output, and command correlations are
          written to the **ESPHome device logs**, not Home Assistant entities.

          **Flight recorder:** press the button, immediately perform the action
          being investigated, then capture the following 10 seconds of ESPHome
          logs.

          **PID5E test warning:** the muted awning-light test transmits a real
          `00 00` PID5E toggle. Maintain line-of-sight and use it only during
          intentional command-path testing.

      - type: entities
        title: ESPHome LIN Controls
        show_header_toggle: false
        entities:
          - entity: button.basement_precision_plex_serial_connection_lin_flight_recorder_10s
            name: Start 10-Second Flight Recorder
          - entity: button.basement_precision_plex_serial_connection_lin_test_pid5e_muted_awning_light_toggle
            name: TEST - Muted PID5E Awning Light Toggle

      - type: markdown
        title: Protocol Status
        content: |
          | PID | Status | Purpose |
          |---|---|---|
          | `1F` | Command learner | Touchscreen command channel |
          | `32` | Decoded | Output and movement bitmap |
          | `37` | Mostly decoded | Two-zone HVAC status |
          | `5E` | Investigating | Wireless TP / BLE response slot |
          | `76` | Unknown | Repeating auxiliary frame |
          | `9C` | Candidate | Scheduler or HVAC auxiliary |
          | `BA` | Decoded | Battery, tanks, propane, generator state/runtime |
          | `DD` | Candidate | Scheduler or housekeeping |
          | `EC` | Decoded | AC/converter and ignition flags |

          Validation watch: confirm the generator runtime whole-hour rollover.

      - type: markdown
        title: Confirmed Command Payloads
        content: |
          | Payload | Command |
          |---|---|
          | `00 00` | Awning light toggle |
          | `04 00` | Water heater toggle |
          | `06 00` | Tank heater toggle |
          | `07 00` | Water pump toggle |
          | `49 00` / `4A 00` | Patio awning retract / extend |
          | `4F 00` / `50 00` | Sofa slide retract / extend |
          | `51 00` / `52 00` | Wardrobe slide retract / extend |
          | `53 00` / `54 00` | Bedroom slide retract / extend |

          Commands remain on Bluetooth in the Home Assistant integration while
          LIN command transport and safe stop behavior are investigated.
