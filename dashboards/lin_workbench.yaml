        content: |
          Battery, tanks, propane, generator state, output state, coach-power
          flags, and HVAC prefer LIN when their decoded source is fresh.

          Complete generator runtime is decoded from PIDBA packed BCD and
          published through the integration. Watch the next whole-hour rollover
          to complete field validation of the carry behavior.

