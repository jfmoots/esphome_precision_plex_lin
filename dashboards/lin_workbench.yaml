          ```text
          {{ states('sensor.basement_precision_plex_serial_connection_pid5e_last_learned_command') }}
          ```

          ## Analyzer Behavior

          Build 012.0 uses the GPIO25 Wireless TP FAULT/TXE claim line during PID5E test commands. It temporarily claims the Wireless TP response slot, sends immediately when `00 55 5E` is observed, then releases the line so the Wireless TP and BLE state update normally.

          Non-idle PID5E payloads are correlated against the same downstream state changes as PID1F:

          | Downstream PID | Correlation Purpose |
          |---|---|
          | PID32 | Lights, water pump, water heater, tank heater, slides, patio awning, generator-running bit |
          | PID37 | HVAC mode, request/phase, operating state, setpoint/telemetry changes |
          | PIDBA | Generator state/runtime telemetry |

          ## Known / Candidate Payloads

          | PID5E Payload | Current Interpretation |
          |---|---|
          | `3F 00` | Idle / bridge ready |
          | `B0 02` | Wireless TP housekeeping / bridge pulse |
          | `B1 01` | Wireless TP housekeeping / bridge pulse |
          | `00 00` | Awning-light toggle; confirmed through muted PID5E injection |
          | `06 00` | Tank-heater toggle learned from PID1F; PMM accepts it, but practical control is blocked by touchscreen ownership |

          ## Current Safe Test

          Use **TEST PID5E Muted Awning Light Toggle** to replay `00 00 A1`. This is the preferred safe command-path test because the Wireless TP and BLE entities resynchronize immediately after the claim is released.

          ## Tank Heater Finding

          PID5E `06 00` was experimentally proven to turn the tank heater on briefly, which confirms the PMM accepts the payload through the Wireless TP slot. The touchscreen then reasserts its internally configured tank-heater state, likely because it owns the tank-heater voltage policy. The test button was removed and this is considered a closed investigation for PID5E-only control.

