esphome:
  name: esphome-web-055454
  friendly_name: Precision Plex LIN Analyzer
  min_version: 2026.6.4
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(lin_tx_enabled).publish_state(true);
          id(lin_tx_last_result).publish_state("ready; no TX attempted since boot");
          id(lin_tx_last_attempt).publish_state("none");
          id(lin_tx_count).publish_state(0);
          id(lin_tx_post_slot_capture).publish_state("none");
          id(lin_tx_echo_seen).publish_state(false);
          id(lin_tx_collision_suspected).publish_state(false);
          id(lin_bridge).release_wireless_tp_mute();

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: git
      url: https://github.com/jfmoots/esphome_precision_plex_lin
      ref: v0.5.0
      path: esphome/components
    components:
      - precision_plex_lin
    refresh: 0s

uart:
  id: lin_uart
  rx_pin: GPIO16
  tx_pin: GPIO17
  baud_rate: 19200
  data_bits: 8
  parity: NONE
  stop_bits: 1

precision_plex_lin:
  id: lin_bridge
  uart_id: lin_uart

button:
  - platform: template
    name: LIN Test PID5E Muted Awning Light Toggle
    id: lin_test_pid5e_fast_awning_light_toggle
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(lin_bridge).queue_pid5e_slot_tx(0x00, 0x00, "PID5E muted awning light toggle", 0);


  - platform: template
    name: LIN Flight Recorder 10s
    id: lin_flight_recorder_10s
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(lin_bridge).trigger_flight_recorder("manual 10s all-PID capture", 10000);

