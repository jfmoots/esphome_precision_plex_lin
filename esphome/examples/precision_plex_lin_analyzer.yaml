substitutions:
  firmware_version: "lin-telemetry-v0.6.0-build013.1-event-transport"
  lin_bridge_id: "esphome-web-055454"

esphome:
  name: esphome-web-055454
  friendly_name: Precision Plex LIN Bridge
  min_version: 2026.6.4
  name_add_mac_suffix: false
  project:
    name: jfmoots.precision-plex-lin
    version: ${firmware_version}
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(lin_bridge).release_wireless_tp_mute();

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: git
      url: https://github.com/jfmoots/esphome_precision_plex_lin
      ref: v0.6.0
      path: esphome/components
    components:
      - precision_plex_lin
    refresh: 0s

uart:
  id: lin_uart
  rx_pin: GPIO16
  tx_pin: GPIO17
  baud_rate: 19200
  data_bits: 8
  parity: NONE
  stop_bits: 1

precision_plex_lin:
  id: lin_bridge
  uart_id: lin_uart
  on_snapshot:
    then:
      - homeassistant.event:
          event: esphome.precision_plex_lin_snapshot
          data:
            bridge_id: ${lin_bridge_id}
          data_template:
            payload: "{{ lin_snapshot }}"
          variables:
            lin_snapshot: !lambda return snapshot;

# Hardware/research actions remain on the bridge. All decoded telemetry entities,
# names, availability, and transport policy are owned by the HA integration.
button:
  - platform: template
    name: LIN Flight Recorder 10s
    id: lin_flight_recorder_10s
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(lin_bridge).trigger_flight_recorder("manual 10s all-PID capture", 10000);

  - platform: template
    name: LIN Test PID5E Muted Awning Light Toggle
    id: lin_test_pid5e_fast_awning_light_toggle
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(lin_bridge).queue_pid5e_slot_tx(
            0x00, 0x00, "PID5E muted awning light toggle", 0
          );
