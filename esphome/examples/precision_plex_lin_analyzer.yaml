interval:
  - interval: 1s
    then:
      - lambda: |-
          auto &s = id(lin_bridge).state();
          s.update_health();

          id(lin_bus_active).publish_state(s.lin_bus_active);
          id(lin_telemetry_active).publish_state(
            s.telemetry.valid && (millis() - s.telemetry.last_seen_ms) <= 10000
          );
          id(lin_output_state_active).publish_state(
            s.outputs.valid && (millis() - s.outputs.last_seen_ms) <= 10000
          );
          id(lin_touchscreen_seen).publish_state(s.touchscreen_seen);
          id(lin_wireless_tp_seen).publish_state(s.wireless_tp_seen);

          id(lin_packets_per_second).publish_state(s.packets_per_second);
          id(lin_known_packets).publish_state(s.known_packets_total);
          id(lin_unknown_packets).publish_state(s.unknown_packets_total);
          id(lin_crc_errors).publish_state(s.bad_packets_total);

          id(lin_firmware_version).publish_state(id(lin_bridge).firmware_version());
          id(lin_tx_enabled).publish_state(s.lin_tx_enabled);
          id(lin_tx_count).publish_state(s.lin_tx_count);
          id(lin_tx_last_attempt).publish_state(s.lin_tx_last_attempt.c_str());
          id(lin_tx_last_result).publish_state(s.lin_tx_last_result.c_str());
          id(lin_tx_post_slot_capture).publish_state(s.lin_tx_post_slot_capture.c_str());
          id(lin_flight_recorder_status).publish_state(s.flight_recorder_status.c_str());
          id(lin_flight_recorder_capture).publish_state(s.flight_recorder_capture.c_str());
          id(lin_tx_echo_seen).publish_state(s.lin_tx_echo_seen);
          id(lin_tx_collision_suspected).publish_state(s.lin_tx_collision_suspected);
          id(lin_last_pid).publish_state(s.last_pid_hex.c_str());
          id(lin_last_frame).publish_state(s.last_frame_raw.c_str());
          id(pid1f_response_timing).publish_state(s.pid1f_response_timing.c_str());
          id(pid1f_last_command).publish_state(s.pid1f_last_command.c_str());
          id(pid1f_last_non_idle_command).publish_state(s.pid1f_last_non_idle_command.c_str());
          id(pid1f_last_learned_command).publish_state(s.pid1f_last_learned_command.c_str());
          id(pid1f_command_history).publish_state(s.pid1f_command_history.c_str());
          id(pid5e_last_frame).publish_state(s.pid5e_last_frame.c_str());
          id(pid5e_last_non_idle_command).publish_state(s.pid5e_last_non_idle_command.c_str());
          id(pid5e_last_learned_command).publish_state(s.pid5e_last_learned_command.c_str());
          id(pid5e_command_history).publish_state(s.pid5e_command_history.c_str());
          id(pid32_last_frame).publish_state(s.pid32_last_frame.c_str());
          id(pid37_last_frame).publish_state(s.pid37_last_frame.c_str());
          id(pid76_last_frame).publish_state(s.pid76_last_frame.c_str());
          id(pid9c_last_frame).publish_state(s.pid9c_last_frame.c_str());
          id(pidba_last_frame).publish_state(s.pidba_last_frame.c_str());
          id(piddd_last_frame).publish_state(s.piddd_last_frame.c_str());
          id(pidec_last_frame).publish_state(s.pidec_last_frame.c_str());

          if (s.outputs.valid) {
            id(lin_awning_light_status).publish_state(s.outputs.awning_light);
            id(lin_water_heater_status).publish_state(s.outputs.water_heater);
            id(lin_tank_heater_status).publish_state(s.outputs.tank_heater);
            id(lin_water_pump_status).publish_state(s.outputs.water_pump);
            id(lin_generator_running).publish_state(s.outputs.generator_running_bit || s.telemetry.generator_state == "running");
            id(lin_sofa_slide_active).publish_state(s.outputs.sofa_extend || s.outputs.sofa_retract);
            id(lin_bedroom_slide_active).publish_state(s.outputs.bedroom_slide_extend || s.outputs.bedroom_slide_retract);
            id(lin_wardrobe_slide_active).publish_state(s.outputs.wardrobe_slide_extend || s.outputs.wardrobe_slide_retract);
            id(lin_patio_awning_active).publish_state(s.outputs.awning_extend || s.outputs.awning_retract);
            id(lin_patio_awning_extending).publish_state(s.outputs.awning_extend);
            id(lin_patio_awning_retracting).publish_state(s.outputs.awning_retract);
            id(lin_sofa_slide_extending).publish_state(s.outputs.sofa_extend);
            id(lin_sofa_slide_retracting).publish_state(s.outputs.sofa_retract);
            id(lin_bedroom_slide_extending).publish_state(s.outputs.bedroom_slide_extend);
            id(lin_bedroom_slide_retracting).publish_state(s.outputs.bedroom_slide_retract);
            id(lin_wardrobe_slide_extending).publish_state(s.outputs.wardrobe_slide_extend);
            id(lin_wardrobe_slide_retracting).publish_state(s.outputs.wardrobe_slide_retract);
          }

          if (s.power.valid) {
            id(lin_ac_converter_present).publish_state(s.power.ac_converter_present);
            id(lin_ignition_on).publish_state(s.power.ignition_on);
          }

          if (s.telemetry.valid) {
            if (!isnan(s.telemetry.house_battery_voltage)) id(lin_house_battery_voltage).publish_state(s.telemetry.house_battery_voltage);
            if (s.telemetry.fresh_tank_percent >= 0) id(lin_fresh_tank).publish_state(s.telemetry.fresh_tank_percent);
            if (s.telemetry.grey_tank_percent >= 0) id(lin_grey_tank).publish_state(s.telemetry.grey_tank_percent);
            if (s.telemetry.black_tank_percent >= 0) id(lin_black_tank).publish_state(s.telemetry.black_tank_percent);
            if (s.telemetry.propane_percent >= 0) id(lin_propane).publish_state(s.telemetry.propane_percent);
            id(lin_generator_state).publish_state(s.telemetry.generator_state.c_str());
            id(lin_generator_runtime_tenths_digit).publish_state(s.telemetry.generator_runtime_tenths_digit);
          }

          if (s.hvac_zone_1.valid) {
            id(hvac_zone_1_room_temp).publish_state(s.hvac_zone_1.room_temp_f);
            id(hvac_zone_1_setpoint).publish_state(s.hvac_zone_1.setpoint_f);
            id(hvac_zone_1_compressor_lockout).publish_state(s.hvac_zone_1.compressor_lockout);
            id(hvac_zone_1_mode_raw).publish_state(s.hvac_zone_1.raw_mode);
            id(hvac_zone_1_mode_family).publish_state(s.hvac_zone_1.raw_mode & 0xF0);
            id(hvac_zone_1_mode_detail).publish_state(s.hvac_zone_1.raw_mode & 0x0F);
            id(hvac_zone_1_fan_raw).publish_state(s.hvac_zone_1.raw_status);
            id(hvac_zone_1_demand_raw).publish_state(s.hvac_zone_1.raw_fan);
            id(hvac_zone_1_lockout_seconds).publish_state(s.hvac_zone_1.lockout_seconds);
            id(hvac_zone_1_unknown_10).publish_state(s.hvac_zone_1.raw_unknown_10);
            id(hvac_zone_1_pid37_field_summary).publish_state(s.hvac_zone_1.field_summary.c_str());
            id(hvac_zone_1_mode).publish_state(s.hvac_zone_1.mode.c_str());
            id(hvac_zone_1_request_phase).publish_state(s.hvac_zone_1.request_phase.c_str());
            id(hvac_zone_1_operating_state).publish_state(s.hvac_zone_1.operating_state.c_str());
            id(hvac_zone_1_fan).publish_state(s.hvac_zone_1.fan.c_str());
          }

          if (s.hvac_zone_2.valid) {
            id(hvac_zone_2_room_temp).publish_state(s.hvac_zone_2.room_temp_f);
            id(hvac_zone_2_setpoint).publish_state(s.hvac_zone_2.setpoint_f);
            id(hvac_zone_2_compressor_lockout).publish_state(s.hvac_zone_2.compressor_lockout);
            id(hvac_zone_2_mode_raw).publish_state(s.hvac_zone_2.raw_mode);
            id(hvac_zone_2_mode_family).publish_state(s.hvac_zone_2.raw_mode & 0xF0);
            id(hvac_zone_2_mode_detail).publish_state(s.hvac_zone_2.raw_mode & 0x0F);
            id(hvac_zone_2_fan_raw).publish_state(s.hvac_zone_2.raw_status);
            id(hvac_zone_2_demand_raw).publish_state(s.hvac_zone_2.raw_fan);
            id(hvac_zone_2_lockout_seconds).publish_state(s.hvac_zone_2.lockout_seconds);
            id(hvac_zone_2_unknown_10).publish_state(s.hvac_zone_2.raw_unknown_10);
            id(hvac_zone_2_pid37_field_summary).publish_state(s.hvac_zone_2.field_summary.c_str());
            id(hvac_zone_2_mode).publish_state(s.hvac_zone_2.mode.c_str());
            id(hvac_zone_2_request_phase).publish_state(s.hvac_zone_2.request_phase.c_str());
            id(hvac_zone_2_operating_state).publish_state(s.hvac_zone_2.operating_state.c_str());
            id(hvac_zone_2_fan).publish_state(s.hvac_zone_2.fan.c_str());
          }
